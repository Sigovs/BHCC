<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BHCC — Hero B · Balanced</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gloock&family=Inter+Tight:wght@400..600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/tokens.css?v=2">
<style>
/* ============================================================
   HERO B — BALANCED  (the comp's own numbers)
   Reading: type and photograph share the frame equally.
   H1 at the measured comp value of 88px. Two-line lockup is not a
   style choice — at 88px the full string needs 1408.9px against
   1344px of content, so it cannot sit on one line (measured).
   The frame is pushed RIGHT and DOWN (object-position 58% 66%) so the
   bright windshield/driver zone (peak 135 at x≈41% / y≈37–50%) slides
   out from under the lockup instead of being covered by it.
   Overlay is the brief's own value, retuned only in shape.
   ============================================================ */
*,*::before,*::after { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--ink);
  font-family: var(--font-sans); font-synthesis: none; -webkit-font-smoothing: antialiased; }

.hero { position: relative; height: 92vh; min-height: 640px; overflow: hidden; }
.hero-media { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
  object-position: 58% 66%; }

/* The brief's values, kept: rgba(0,0,0,.25) edge -> rgba(0,0,0,.45) centre.
   Centre of the gradient is lifted to 44% to sit under the lockup, not under
   the car's brightest panel — the image stays atmospheric, not washed out. */
.hero::after { content: ""; position: absolute; inset: 0; z-index: 1;
  background: radial-gradient(120% 95% at 50% 44%,
    rgba(0,0,0,.45) 0%, rgba(0,0,0,.25) 100%); }

.hero-in { position: relative; z-index: 2; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 0 var(--container-pad);
  transform: translateY(-4%);   /* optical centre, not mathematical */ }

.hero h1 { margin: 0; font-family: var(--font-display); font-weight: 400;
  font-size: 88px; line-height: var(--lh-display); letter-spacing: var(--ls-display); color: #fff; }
.hero h1 span { display: block; }

/* Brief §02: the subheadline is ONE line. No max-width here — a ch cap wraps it. */
.hero .sub { margin: var(--sp-3) 0 0; font-size: 20px; font-weight: 400;
  line-height: 1.5; color: rgba(255,255,255,.92); white-space: nowrap; }

.ctas { display: flex; gap: 14px; margin-top: var(--sp-5); }
.ctas a { padding: 14px 30px; border: 1px solid rgba(255,255,255,.85);
  color: #fff; text-decoration: none; font-size: 15px; font-weight: 500;
  letter-spacing: .01em; transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease); }
.ctas a:hover, .ctas a:focus-visible { background: rgba(255,255,255,.16); }
.ctas a + a { border-color: rgba(255,255,255,.5); color: rgba(255,255,255,.86); }
.ctas a:focus-visible { outline: 2px solid var(--focus-dark); outline-offset: 3px; }

@media (max-width: 767.98px) {
  .hero { height: 76vh; min-height: 520px; }
  .hero-media { object-position: 58% 62%; }
  .hero-in { transform: none; }
  .hero h1 { font-size: 34px; line-height: 1.04; }   /* measured: widest line 324.7px inside 350px */
  .hero .sub { font-size: 16px; white-space: normal; max-width: 34ch; }
  .ctas { flex-direction: column; width: 100%; gap: 12px; margin-top: var(--sp-4); }
  .ctas a { width: 100%; padding: 15px 0; }
}
@media (prefers-reduced-motion: reduce) { .ctas a { transition: none; } }
</style>
</head>
<body>
<section class="hero">
  <video class="hero-media" autoplay muted loop playsinline
         poster="assets/images/hero-still.jpg" aria-label="1965 Mercedes-Benz 300SL Roadster">
    <!-- <source src="assets/video/hero.mp4" type="video/mp4"> -->
  </video>
  <div class="hero-in">
    <h1><span>Beverly Hills Car Club</span><span>by Alex Manos</span></h1>
    <p class="sub">The world's largest dealer of European and American classic cars.</p>
    <div class="ctas">
      <a href="/inventory.htm">Browse inventory</a>
      <a href="/sell-your-car.htm">Sell your classic</a>
    </div>
  </div>
</section>
<script>
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    document.querySelectorAll('video.hero-media').forEach(v => { v.removeAttribute('autoplay'); v.pause(); });
  }
</script>
</body>
</html>
