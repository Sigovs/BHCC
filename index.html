<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Beverly Hills Car Club by Alex Manos</title>
<meta name="description" content="The world's largest dealer of European and American classic cars. Los Angeles.">

<!-- Hero built to the Figma proto 2002:730 (updated): full-bleed canyon frame,
     transparent header, centred Gloock lockup at the top, glass CTAs bottom-left,
     Play Video bottom-right. Type + colour from tokens.css. -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gloock&family=Newsreader:ital@1&family=Inter+Tight:wght@300..600&display=swap" rel="stylesheet">

<link rel="icon" href="assets/images/favicon-32.png" type="image/png">
<link rel="stylesheet" href="assets/css/tokens.css?v=9">

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body, h1, h2, h3, p, figure, ul { margin: 0; }
  ul { padding: 0; list-style: none; }
  img, picture, video { display: block; max-width: 100%; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-sans);
    font-size: var(--fs-body);
    line-height: var(--lh-body);
    font-synthesis: none;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  /* ============================================================
     HERO — full-bleed, centred lockup (Figma 2002:730)
     ============================================================ */
  .hero {
    position: relative;
    min-height: 100svh;
    display: grid;
    grid-template-rows: auto auto 1fr auto;
    overflow: hidden;
    background: #070a0b;
    isolation: isolate;
  }
  .hero__media { position: absolute; inset: 0; z-index: -2; }
  .hero__media img { width: 100%; height: 100%; object-fit: cover; object-position: 56% 60%; }
  .hero__scrim {
    position: absolute; inset: 0; z-index: -1;
    background:
      linear-gradient(to bottom, rgba(7,10,11,.55) 0%, rgba(7,10,11,.20) 26%, rgba(7,10,11,.05) 50%, rgba(7,10,11,.55) 100%),
      radial-gradient(80% 44% at 50% 30%, rgba(7,10,11,.28) 0%, rgba(7,10,11,0) 70%);
  }

  .hero__row { padding-inline: clamp(24px, 7vw, 116px); }

  /* header */
  .hero__header {
    display: flex; align-items: center; justify-content: space-between; gap: 24px;
    padding-top: clamp(18px, 2.2vw, 30px); padding-bottom: 12px;
  }
  .brand { display: inline-flex; align-items: center; gap: 16px; }
  .brand__shield { width: auto; height: clamp(58px, 5.6vw, 92px); }
  .brand__sig { width: auto; height: clamp(20px, 1.8vw, 30px); opacity: .95; }
  .hero__nav ul { display: flex; align-items: center; gap: clamp(18px, 2vw, 32px); }
  .hero__nav a { font-family: var(--font-sans); font-weight: 300; font-size: clamp(14px, 1.05vw, 18px); color: #fff; letter-spacing: .01em; padding-block: 6px; transition: color .2s; }
  .hero__nav a:hover { color: var(--gold); }

  /* centred head block */
  .hero__head {
    text-align: center;
    margin-top: clamp(48px, 12vh, 150px);
    padding-inline: clamp(24px, 6vw, 80px);
  }
  .hero__title {
    font-family: var(--font-display); font-weight: 400; color: #fff;
    line-height: 1.04; letter-spacing: -.01em;
    font-size: clamp(2.4rem, 5.4vw, 5rem);      /* → 80px */
    white-space: nowrap;
  }
  .hero__sub {
    margin: clamp(14px, 1.8vw, 22px) auto 0;
    max-width: 60ch;
    font-family: var(--font-sans); font-weight: 300;
    font-size: clamp(15px, 1.3vw, 20px); line-height: 1.5;
    color: rgba(255,255,255,.92);
  }

  /* bottom row: CTAs left, Play Video right */
  .hero__foot {
    display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap;
    padding-bottom: clamp(40px, 12vh, 116px);
  }
  .hero__ctas { display: flex; gap: 16px; flex-wrap: wrap; }
  .glass {
    display: inline-flex; align-items: center; justify-content: center;
    height: 50px; padding: 0 22px; min-width: 200px;
    border-radius: 5px; font-family: var(--font-sans); font-weight: 400; font-size: 16px; color: #fff;
    -webkit-backdrop-filter: blur(24px); backdrop-filter: blur(24px);
    background: rgba(217,217,217,.16); border: 1px solid rgba(255,255,255,.14);
    transition: background .22s, border-color .22s, transform .22s;
  }
  .glass:hover { background: rgba(217,217,217,.26); transform: translateY(-1px); }
  .glass--fill { background: rgba(217,217,217,.22); border-color: rgba(255,255,255,.2); }
  .glass--outline { background: rgba(217,217,217,.10); border-color: #6b716f; }

  .play { display: inline-flex; align-items: center; gap: 16px; color: #fff; }
  .play__label { font-family: var(--font-sans); font-weight: 400; font-size: 20px; }
  .play__circle {
    width: 58px; height: 58px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,.65);
    display: grid; place-items: center;
    -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
    background: rgba(217,217,217,.08);
    transition: background .22s, transform .22s;
  }
  .play:hover .play__circle { background: rgba(217,217,217,.2); transform: scale(1.05); }
  .play__tri { width: 0; height: 0; margin-left: 3px; border-style: solid; border-width: 7px 0 7px 12px; border-color: transparent transparent transparent #fff; }

  /* search band (brief §03) */
  .search-band { border-bottom: 1px solid rgba(26,26,24,.08); background: var(--bg); }
  .search-band__in { max-width: 1440px; margin-inline: auto; padding-inline: clamp(24px, 4vw, 56px); display: flex; align-items: center; gap: 24px; height: 84px; }
  .search-form { flex: 1; display: flex; justify-content: center; }
  .search-form__field { position: relative; width: min(560px, 100%); }
  .search-form__field input {
    width: 100%; height: 48px; padding: 0 46px 0 18px;
    background: var(--bg-deep); border: 1px solid rgba(26,26,24,.10);
    font-family: var(--font-sans); font-size: 15px; color: var(--ink);
  }
  .search-form__field input::placeholder { color: var(--ink-muted); }
  .search-form__field .ic { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: var(--ink-muted); }
  .browse-all { display: inline-flex; align-items: center; gap: 8px; font-size: 15px; color: var(--ink); white-space: nowrap; }
  .browse-all:hover { color: var(--gold-ink); }

  @media (max-width: 820px) {
    .hero__nav { display: none; }
    .hero__title { white-space: normal; }
    .hero__foot { flex-direction: column; align-items: stretch; gap: 18px; }
    .hero__ctas { flex-direction: column; }
    .glass { width: 100%; }
    .play { justify-content: center; }
    .search-band__in { flex-direction: column; height: auto; padding-block: 20px; gap: 14px; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="hero__media">
    <picture>
      <source media="(max-width: 700px)" srcset="assets/images/hero-canyon-sm.jpg">
      <img src="assets/images/hero-canyon.jpg" alt="A 1957 Mercedes-Benz 300SL Roadster on a canyon road above Los Angeles" fetchpriority="high">
    </picture>
  </div>
  <div class="hero__scrim"></div>

  <!-- header -->
  <header class="hero__header hero__row">
    <a class="brand" href="/" aria-label="Beverly Hills Car Club by Alex Manos — home">
      <img class="brand__shield" src="assets/images/logo-shield-hi.png?v=2" alt="" width="123" height="124">
      <img class="brand__sig" src="assets/images/logo-signature-cream.png" alt="" width="155" height="34">
    </a>
    <nav class="hero__nav" aria-label="Main">
      <ul>
        <li><a href="/inventory.htm">Inventory</a></li>
        <li><a href="/sell-your-car.htm">Sell Your Car</a></li>
        <li><a href="/about.htm">About</a></li>
        <li><a href="/blog.htm">Blog</a></li>
        <li><a href="/how-to-buy.htm">How to Buy</a></li>
        <li><a href="/contact.htm">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- centred lockup -->
  <div class="hero__head hero__row">
    <h1 class="hero__title">Beverly Hills Car Club</h1>
    <p class="hero__sub">The world's largest dealer of European and American classic cars.</p>
  </div>

  <!-- bottom actions -->
  <div class="hero__foot hero__row">
    <div class="hero__ctas">
      <a class="glass glass--fill" href="/inventory.htm">Browse Our Inventory</a>
      <a class="glass glass--outline" href="/sell-your-car.htm">Sell Your Classic</a>
    </div>
    <button class="play" type="button" aria-label="Play video">
      <span class="play__label">Play Video</span>
      <span class="play__circle"><span class="play__tri" aria-hidden="true"></span></span>
    </button>
  </div>
</section>

<!-- search band -->
<section class="search-band" aria-label="Search inventory">
  <div class="search-band__in">
    <form class="search-form" action="/inventory.htm" role="search">
      <div class="search-form__field">
        <input type="search" placeholder="Search by make, model, year…" aria-label="Search inventory">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      </div>
    </form>
    <a class="browse-all" href="/inventory.htm">Browse all inventory <span aria-hidden="true">→</span></a>
  </div>
</section>

</body>
</html>
