<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BHCC — Hero A · Restrained</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gloock&family=Inter+Tight:wght@400..600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/tokens.css?v=2">
<style>
/* ============================================================
   HERO A — RESTRAINED
   Reading: the photograph is the hero; the type is a caption to it.
   H1 at 72px sits HIGH, in the 0–25% band where the frame measures
   mean luminance 26–37 (darkest in the image) — so the overlay can
   be lighter than the brief's default and the 300SL keeps its colour.
   The driver's face and windshield (the bright zone, peak 135 at
   x≈41% / y≈37–50%) stay BELOW the lockup, uncovered.
   Structure is the brief's, unchanged: centred H1, one-line sub,
   two ghost CTAs side by side.
   ============================================================ */
*,*::before,*::after { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--ink);
  font-family: var(--font-sans); font-synthesis: none; -webkit-font-smoothing: antialiased; }

.hero { position: relative; height: 92vh; min-height: 620px; overflow: hidden; }
.hero-media { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
  object-position: 50% 62%; }   /* push the car down; keep the dark sky band up top for type */

/* Overlay is LIGHTER than the brief default (.25→.45) because the type sits on
   the darkest band. Measured mean there is 26–37; .45 would crush the frame.
   Still a centred radial, still the brief's shape — just retuned to this still. */
.hero::after { content: ""; position: absolute; inset: 0; z-index: 1;
  background: radial-gradient(125% 90% at 50% 34%,
    rgba(0,0,0,.38) 0%, rgba(0,0,0,.30) 45%, rgba(0,0,0,.18) 100%); }

.hero-in { position: relative; z-index: 2; height: 100%;
  display: flex; flex-direction: column; align-items: center;
  justify-content: flex-start; text-align: center;
  padding: 14vh var(--container-pad) 0; }

.hero h1 { margin: 0; font-family: var(--font-display); font-weight: 400;
  font-size: 72px; line-height: 1.06; letter-spacing: -0.015em; color: #fff;
  text-wrap: balance; }
.hero h1 span { display: block; }

/* Brief §02: the subheadline is ONE line. No max-width here — a ch cap wraps it. */
.hero .sub { margin: var(--sp-4) 0 0; font-size: 19px; font-weight: 400;
  line-height: 1.5; color: rgba(255,255,255,.9); letter-spacing: .005em; white-space: nowrap; }

/* CTAs let go of the text — this variant is about air. */
.ctas { display: flex; gap: 16px; margin-top: var(--sp-6); }
.ctas a { padding: 15px 34px; border: 1px solid rgba(255,255,255,.72);
  color: #fff; text-decoration: none; font-size: 15px; font-weight: 500;
  letter-spacing: .01em; transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease); }
.ctas a:hover, .ctas a:focus-visible { background: rgba(255,255,255,.14); border-color: #fff; }
.ctas a + a { border-color: rgba(255,255,255,.42); color: rgba(255,255,255,.88); }
.ctas a:focus-visible { outline: 2px solid var(--focus-dark); outline-offset: 3px; }

@media (max-width: 767.98px) {
  .hero { height: 78vh; min-height: 520px; }
  .hero-media { object-position: 56% 60%; }
  .hero-in { padding: 12vh var(--container-pad) 0; justify-content: flex-start; }
  .hero h1 { font-size: 32px; line-height: 1.08; }
  /* the one-line rule cannot hold at 390 — 65 characters will not fit 350px
     at any readable size. Wrapping is the correct behaviour here. */
  .hero .sub { font-size: 16px; margin-top: var(--sp-3); white-space: normal; max-width: 34ch; }
  .ctas { flex-direction: column; width: 100%; gap: 12px; margin-top: var(--sp-5); }
  .ctas a { width: 100%; padding: 15px 0; }
}
@media (prefers-reduced-motion: reduce) { .ctas a { transition: none; } }
</style>
</head>
<body>
<section class="hero">
  <!-- Video-ready: drop the mp4 into <source> and nothing else changes.
       With no source present the poster frame renders — which is the state today,
       since the content team has not delivered footage. -->
  <video class="hero-media" autoplay muted loop playsinline
         poster="assets/images/hero-still.jpg" aria-label="1965 Mercedes-Benz 300SL Roadster">
    <!-- <source src="assets/video/hero.mp4" type="video/mp4"> -->
  </video>
  <div class="hero-in">
    <h1><span>Beverly Hills Car Club</span><span>by Alex Manos</span></h1>
    <p class="sub">The world's largest dealer of European and American classic cars.</p>
    <div class="ctas">
      <a href="/inventory.htm">Browse inventory</a>
      <a href="/sell-your-car.htm">Sell your classic</a>
    </div>
  </div>
</section>
<script>
  // No-JS: the poster still renders. Reduced motion: hold the poster frame.
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    document.querySelectorAll('video.hero-media').forEach(v => { v.removeAttribute('autoplay'); v.pause(); });
  }
</script>
</body>
</html>
