<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Beverly Hills Car Club by Alex Manos</title>
<meta name="description" content="The world's largest dealer of European and American classic cars. Los Angeles.">

<!-- CLEAN SLATE — index2. Type + colour from tokens.css. Hero built to the Figma
     proto (node 2002:730): transparent header over a canyon frame, left lockup,
     glass CTAs, a Play Video pill. Title set in Gloock (our final display face),
     not the Figma outlines. -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gloock&family=Newsreader:ital@1&family=Inter+Tight:wght@300..600&display=swap" rel="stylesheet">

<link rel="icon" href="assets/images/favicon-32.png" type="image/png">
<link rel="stylesheet" href="assets/css/tokens.css?v=9">

<style>
  /* ---------- minimal reset ---------- */
  *, *::before, *::after { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body, h1, h2, h3, p, figure, ul { margin: 0; }
  ul { padding: 0; list-style: none; }
  img, picture, video { display: block; max-width: 100%; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }

  /* ---------- base: type + colour from tokens ---------- */
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-sans);
    font-size: var(--fs-body);
    line-height: var(--lh-body);
    font-synthesis: none;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  /* ============================================================
     HERO — Figma proto 2002:730
     ============================================================ */
  .hero {
    position: relative;
    min-height: 100svh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    overflow: hidden;
    background: #070a0b;                 /* Figma base under the frame */
    isolation: isolate;
  }

  /* --- background frame + overlay --- */
  .hero__media { position: absolute; inset: 0; z-index: -2; }
  .hero__media img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: 66% 82%;            /* pull focus down the frame → car rides higher on screen */
    transform: scale(1.12);              /* zoom creates the vertical headroom object-position needs */
    transform-origin: 66% 100%;
  }
  .hero__scrim {
    position: absolute; inset: 0; z-index: -1;
    background:
      linear-gradient(100deg, rgba(7,10,11,.74) 0%, rgba(7,10,11,.45) 34%, rgba(7,10,11,.05) 62%, rgba(7,10,11,0) 80%),
      linear-gradient(to bottom, rgba(7,10,11,.30) 0%, rgba(7,10,11,0) 26%, rgba(7,10,11,0) 62%, rgba(7,10,11,.42) 100%);
  }

  /* --- shared page gutter (Figma content sits at x≈239/1920) --- */
  .hero__row { padding-inline: clamp(24px, 7vw, 116px); }

  /* --- header --- */
  .hero__header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px;
    padding-top: clamp(18px, 2.2vw, 30px);
    padding-bottom: 12px;
  }
  .brand { display: inline-flex; align-items: center; gap: 16px; }
  .brand__shield { width: auto; height: clamp(64px, 6.4vw, 104px); }
  .brand__sig { width: auto; height: clamp(22px, 2vw, 32px); opacity: .95; }

  .hero__nav ul { display: flex; align-items: center; gap: clamp(18px, 2vw, 34px); }
  .hero__nav a {
    font-family: var(--font-sans);
    font-weight: 300;
    font-size: clamp(14px, 1.1vw, 18px);
    color: #fff;
    letter-spacing: .01em;
    padding-block: 6px;
    transition: color .2s ease;
  }
  .hero__nav a:hover { color: var(--gold); }

  /* --- centre lockup --- */
  .hero__content {
    align-self: center;
    padding-top: clamp(24px, 6vh, 80px);
    max-width: 760px;
  }
  .hero__title {
    font-family: var(--font-display);
    font-weight: 400;
    color: #fff;
    line-height: .98;
    letter-spacing: -.015em;
    font-size: var(--fs-hero);           /* 30 → 96, height-aware */
  }
  .hero__title .l { display: block; white-space: nowrap; }   /* Beverly Hills / Car Club — always two lines */
  .hero__title .sig {
    font-family: var(--font-text);       /* Newsreader italic — our editorial cursive */
    font-style: italic;
    font-weight: 400;
    font-size: .34em;
    letter-spacing: 0;
    color: rgba(255,255,255,.92);
    margin-left: .28em;
    vertical-align: baseline;
    white-space: nowrap;
  }
  .hero__sub {
    margin-top: clamp(18px, 2.4vw, 28px);
    max-width: 30ch;
    font-family: var(--font-sans);
    font-weight: 300;
    font-size: clamp(16px, 1.4vw, 20px);
    line-height: 1.5;
    color: rgba(255,255,255,.90);
  }

  /* --- bottom action row --- */
  .hero__actions {
    display: flex; align-items: center; justify-content: space-between;
    gap: 24px; flex-wrap: wrap;
    padding-bottom: clamp(28px, 5vh, 64px);
  }
  .hero__ctas { display: flex; gap: 16px; flex-wrap: wrap; }

  /* glass buttons (Figma: backdrop-blur, translucent, radius 5) */
  .glass {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    height: 50px; padding: 0 26px;
    border-radius: 5px;
    font-family: var(--font-sans);
    font-weight: 400; font-size: 16px; color: #fff;
    -webkit-backdrop-filter: blur(24px); backdrop-filter: blur(24px);
    background: rgba(217,217,217,.16);
    border: 1px solid rgba(255,255,255,.14);
    transition: background .22s ease, border-color .22s ease, transform .22s ease;
  }
  .glass:hover { background: rgba(217,217,217,.26); transform: translateY(-1px); }
  .glass--fill { background: rgba(217,217,217,.22); border-color: rgba(255,255,255,.20); }
  .glass--outline { background: rgba(217,217,217,.10); border-color: #6b716f; }
  .glass--pill { border-radius: 999px; padding: 0 28px; }
  .glass--pill .tri {
    width: 0; height: 0;
    border-style: solid; border-width: 6px 0 6px 10px;
    border-color: transparent transparent transparent #fff;
  }

  /* ---------- desktop refinements ---------- */
  @media (min-width: 900px) {
    .hero__title { font-size: clamp(3rem, 6.2vw, 5.75rem); }
  }

  /* ---------- mobile ---------- */
  @media (max-width: 640px) {
    .hero { min-height: 88svh; grid-template-rows: auto 1fr auto; }
    .hero__nav { display: none; }              /* burger comes when we build nav */
    .hero__title .sig { display: inline-block; margin-left: 0; }
    .hero__actions { flex-direction: column; align-items: stretch; }
    .hero__ctas { flex-direction: column; }
    .glass { width: 100%; }
    .hero__actions .glass--pill { order: -1; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="hero__media">
    <picture>
      <source media="(max-width: 700px)" srcset="assets/images/hero-canyon-sm.jpg">
      <img src="assets/images/hero-canyon.jpg" alt="A 1957 Mercedes-Benz 300SL Roadster on a canyon road above Los Angeles" fetchpriority="high">
    </picture>
  </div>
  <div class="hero__scrim"></div>

  <!-- header over the frame -->
  <header class="hero__header hero__row">
    <a class="brand" href="/" aria-label="Beverly Hills Car Club by Alex Manos — home">
      <img class="brand__shield" src="assets/images/logo-shield-hi.png?v=2" alt="" width="123" height="124">
      <img class="brand__sig" src="assets/images/logo-signature-cream.png" alt="" width="155" height="34">
    </a>
    <nav class="hero__nav" aria-label="Main">
      <ul>
        <li><a href="/inventory.htm">Inventory</a></li>
        <li><a href="/sell-your-car.htm">Sell Your Car</a></li>
        <li><a href="/about.htm">About</a></li>
        <li><a href="/blog.htm">Blog</a></li>
        <li><a href="/how-to-buy.htm">How to Buy</a></li>
        <li><a href="/contact.htm">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- centre lockup -->
  <div class="hero__content hero__row">
    <h1 class="hero__title">
      <span class="l">Beverly Hills</span>
      <span class="l">Car Club<em class="sig">by Alex Manos</em></span>
    </h1>
    <p class="hero__sub">The world's largest dealer of European and American classic cars.</p>
  </div>

  <!-- bottom actions -->
  <div class="hero__actions hero__row">
    <div class="hero__ctas">
      <a class="glass glass--fill" href="/inventory.htm">Browse Our Inventory</a>
      <a class="glass glass--outline" href="/sell-your-car.htm">Sell Your Classic</a>
    </div>
    <button class="glass glass--pill" type="button" aria-label="Play video">
      <span class="tri" aria-hidden="true"></span>
      <span>Play Video</span>
    </button>
  </div>
</section>

</body>
</html>
