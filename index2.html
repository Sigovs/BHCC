<style>
  /* --- minimal reset --- */
  *, *::before, *::after { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body, h1, h2, h3, h4, h5, h6, p, figure, blockquote { margin: 0; }
  img, picture, video { display: block; max-width: 100%; height: auto; }
  a { color: inherit; text-decoration: none; }

  /* --- base: type system + colour, straight from tokens.css --- */
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-sans);
    font-size: var(--fs-body);
    line-height: var(--lh-body);
    font-weight: var(--fw-body);
    font-synthesis: none;              /* Gloock is single-weight — never fake a bold */
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  h1, h2, h3, h4 {
    font-family: var(--font-display);
    font-weight: var(--fw-heading);
    letter-spacing: var(--ls-h2);
    color: var(--ink);
  }
  h1 { font-size: var(--fs-h1); line-height: var(--lh-h1); }
  h2 { font-size: var(--fs-h2); line-height: var(--lh-h2); }
  h3 { font-size: var(--fs-h3); line-height: var(--lh-h3); }

  .eyebrow {
    font-family: var(--font-sans);
    font-size: var(--fs-eyebrow);
    font-weight: var(--fw-semibold);
    letter-spacing: var(--ls-eyebrow);
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  .quote {                              /* Newsreader italic — the only place it lives */
    font-family: var(--font-text);
    font-style: italic;
    font-size: var(--fs-quote);
    line-height: var(--lh-quote);
    color: var(--ink-soft);
  }
</style>
</head>
